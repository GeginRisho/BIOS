apiVersion: v1
kind: Namespace
metadata:
  name: bios-production

---
# Central API Gateway Ingress-Nginx Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bios-gateway
  namespace: bios-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bios-gateway
  template:
    metadata:
      labels:
        app: bios-gateway
    spec:
      containers:
      - name: gateway
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: gateway-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
      volumes:
      - name: gateway-config
        configMap:
          name: bios-gateway-cm

---
# Auth Microservice Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bios-auth-service
  namespace: bios-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bios-auth-service
  template:
    metadata:
      labels:
        app: bios-auth-service
    spec:
      containers:
      - name: auth-svc
        image: gcr.io/bios-enterprise/auth-service:latest
        command: ["uvicorn", "services.auth_service.main:app", "--host", "0.0.0.0", "--port", "8001"]
        ports:
        - containerPort: 8001
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: bios-secrets
              key: pg-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bios-secrets
              key: pg-password
        - name: POSTGRES_HOST
          value: "postgres-svc"
        - name: POSTGRES_DB
          value: "bios_db"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bios-secrets
              key: jwt-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"

---
# Crawler Microservice Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bios-crawler-service
  namespace: bios-production
spec:
  replicas: 4
  selector:
    matchLabels:
      app: bios-crawler-service
  template:
    metadata:
      labels:
        app: bios-crawler-service
    spec:
      containers:
      - name: crawler-svc
        image: gcr.io/bios-enterprise/crawler-service:latest
        command: ["uvicorn", "services.crawler_service.main:app", "--host", "0.0.0.0", "--port", "8005"]
        ports:
        - containerPort: 8005
        env:
        - name: MONGO_USER
          value: "bios_mongo"
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bios-secrets
              key: mongo-password
        - name: MONGO_HOST
          value: "mongo-svc"
        - name: REDIS_HOST
          value: "redis-svc"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-svc:9092"
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
