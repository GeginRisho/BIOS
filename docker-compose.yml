version: '3.8'

services:
  # Relational & Time-Series DB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bios-postgres
    restart: always
    environment:
      POSTGRES_USER: bios_admin
      POSTGRES_PASSWORD: bios_secure_pwd_2026
      POSTGRES_DB: bios_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bios-network

  # Graph Database
  neo4j:
    image: neo4j:5.12.0
    container_name: bios-neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt Protocol
    environment:
      NEO4J_AUTH: neo4j/bios_graph_secure_2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    networks:
      - bios-network

  # Unstructured Raw Storage
  mongodb:
    image: mongo:6.0
    container_name: bios-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: bios_mongo
      MONGO_INITDB_ROOT_PASSWORD: bios_mongo_secure_2026
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - bios-network

  # Vector Database for Semantic Search / RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bios-qdrant
    restart: always
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - bios-network

  # Text Search Engine
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: bios-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - bios-network

  # Task Queue Broker & Cache Store
  redis:
    image: redis:7.2-alpine
    container_name: bios-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - bios-network

  # Event Broker (KRaft Mode Kafka)
  kafka:
    image: apache/kafka:latest
    container_name: bios-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    networks:
      - bios-network

networks:
  bios-network:
    driver: bridge

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
  mongodata:
  qdrantdata:
  esdata:
  redisdata:
