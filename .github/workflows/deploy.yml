name: BIOS Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Microservices Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/requirements.txt

    - name: Run Pytest Suite
      run: |
        cd services
        python -m pytest tests/

  build-and-release:
    name: Build Docker Containers & Publish to Registry
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Authenticate to GCR
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Build and Push Auth Service Container
      run: |
        docker build -t gcr.io/bios-enterprise/auth-service:${{ github.sha }} -t gcr.io/bios-enterprise/auth-service:latest -f services/auth-service/Dockerfile .
        docker push gcr.io/bios-enterprise/auth-service:latest

    - name: Build and Push Crawler Service Container
      run: |
        docker build -t gcr.io/bios-enterprise/crawler-service:${{ github.sha }} -t gcr.io/bios-enterprise/crawler-service:latest -f services/crawler-service/Dockerfile .
        docker push gcr.io/bios-enterprise/crawler-service:latest
